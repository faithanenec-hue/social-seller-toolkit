openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Social Seller Toolkit API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: captions
    description: Caption library operations
  - name: broadcasts
    description: Broadcast template operations
  - name: products
    description: Product operations
  - name: orders
    description: Order management
  - name: wishlist
    description: Customer wishlist
  - name: loyalty
    description: Customer loyalty rewards
  - name: analytics
    description: Seller analytics
  - name: collections
    description: Caption collection operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /captions:
    get:
      operationId: listCaptions
      tags: [captions]
      summary: List captions with filters
      parameters:
        - name: niche
          in: query
          schema:
            type: string
        - name: tone
          in: query
          schema:
            type: string
        - name: platform
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of captions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptionListResponse"
    post:
      operationId: createCaption
      tags: [captions]
      summary: Create a new caption template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Caption"

  /captions/popular:
    get:
      operationId: getPopularCaptions
      tags: [captions]
      summary: Get most popular captions
      responses:
        "200":
          description: Popular captions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Caption"

  /captions/niches:
    get:
      operationId: listCaptionNiches
      tags: [captions]
      summary: Get available niche categories
      responses:
        "200":
          description: Niche list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NicheStat"

  /captions/generate:
    post:
      operationId: generateCaption
      tags: [captions]
      summary: AI-generate captions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptionGenerateInput"
      responses:
        "200":
          description: Generated captions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedCaptions"

  /captions/{id}:
    get:
      operationId: getCaption
      tags: [captions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Caption
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Caption"
        "404":
          description: Not found

  /captions/{id}/save:
    post:
      operationId: saveCaption
      tags: [captions]
      summary: Save or unsave a caption
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveCaptionInput"
      responses:
        "200":
          description: Save status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedCaption"

  /captions/saved:
    get:
      operationId: listSavedCaptions
      tags: [captions]
      summary: List seller's saved captions
      responses:
        "200":
          description: Saved captions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Caption"

  /broadcasts:
    get:
      operationId: listBroadcasts
      tags: [broadcasts]
      summary: List broadcast templates
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: niche
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of broadcast templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BroadcastTemplate"
    post:
      operationId: createBroadcast
      tags: [broadcasts]
      summary: Create broadcast template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastTemplate"

  /broadcasts/generate:
    post:
      operationId: generateBroadcast
      tags: [broadcasts]
      summary: AI-generate broadcast message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastGenerateInput"
      responses:
        "200":
          description: Generated broadcast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedBroadcast"

  /broadcasts/{id}:
    get:
      operationId: getBroadcast
      tags: [broadcasts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Broadcast template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastTemplate"
        "404":
          description: Not found

  /broadcasts/{id}/stats:
    patch:
      operationId: updateBroadcastStats
      tags: [broadcasts]
      summary: Update broadcast engagement stats manually
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastStatsUpdate"
      responses:
        "200":
          description: Updated broadcast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastTemplate"
        "404":
          description: Not found

  /broadcasts/{id}/schedule:
    patch:
      operationId: scheduleBroadcast
      tags: [broadcasts]
      summary: Schedule or mark a broadcast as sent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastScheduleInput"
      responses:
        "200":
          description: Updated broadcast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastTemplate"
        "404":
          description: Not found

  /collections:
    get:
      operationId: listCollections
      tags: [collections]
      summary: List all caption collections
      responses:
        "200":
          description: Collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Collection"
    post:
      operationId: createCollection
      tags: [collections]
      summary: Create a caption collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"

  /collections/{id}:
    get:
      operationId: getCollection
      tags: [collections]
      summary: Get a collection with its captions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Collection with captions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionWithCaptions"
        "404":
          description: Not found
    patch:
      operationId: updateCollection
      tags: [collections]
      summary: Update a collection name or description
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionInput"
      responses:
        "200":
          description: Updated collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "404":
          description: Not found
    delete:
      operationId: deleteCollection
      tags: [collections]
      summary: Delete a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /collections/{id}/captions:
    post:
      operationId: addCaptionToCollection
      tags: [collections]
      summary: Add a caption to a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCaptionToCollectionInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionItem"

  /collections/{id}/captions/{captionId}:
    delete:
      operationId: removeCaptionFromCollection
      tags: [collections]
      summary: Remove a caption from a collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: captionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: niche
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    patch:
      operationId: updateProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: customerId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/summary:
    get:
      operationId: getOrderSummary
      tags: [orders]
      summary: Get order analytics summary for seller
      responses:
        "200":
          description: Order summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderSummary"

  /orders/recent:
    get:
      operationId: getRecentOrders
      tags: [orders]
      summary: Get recent orders
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "404":
          description: Not found

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /wishlist:
    get:
      operationId: listWishlist
      tags: [wishlist]
      summary: Get customer wishlist
      responses:
        "200":
          description: Wishlist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WishlistItem"
    post:
      operationId: addToWishlist
      tags: [wishlist]
      summary: Add product to wishlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WishlistInput"
      responses:
        "201":
          description: Added to wishlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WishlistItem"

  /wishlist/{id}:
    delete:
      operationId: removeFromWishlist
      tags: [wishlist]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /loyalty:
    get:
      operationId: getLoyalty
      tags: [loyalty]
      summary: Get customer loyalty info
      responses:
        "200":
          description: Loyalty data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loyalty"

  /analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [analytics]
      summary: Get seller analytics overview
      responses:
        "200":
          description: Analytics overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Caption:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        niche:
          type: string
        tone:
          type: string
        platform:
          type: string
        type:
          type: string
        category:
          type: string
        usageCount:
          type: integer
        isSaved:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - text
        - niche
        - tone
        - platform
        - type
        - category
        - usageCount
        - isSaved
        - createdAt

    CaptionInput:
      type: object
      properties:
        text:
          type: string
        niche:
          type: string
        tone:
          type: string
        platform:
          type: string
        type:
          type: string
        category:
          type: string
      required:
        - text
        - niche
        - tone
        - platform
        - type
        - category

    CaptionListResponse:
      type: object
      properties:
        captions:
          type: array
          items:
            $ref: "#/components/schemas/Caption"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - captions
        - total
        - page
        - totalPages

    NicheStat:
      type: object
      properties:
        niche:
          type: string
        count:
          type: integer
      required:
        - niche
        - count

    CaptionGenerateInput:
      type: object
      properties:
        productName:
          type: string
        niche:
          type: string
        tone:
          type: string
        promotionGoal:
          type: string
        platforms:
          type: array
          items:
            type: string
      required:
        - productName
        - niche
        - tone
        - promotionGoal
        - platforms

    GeneratedCaptions:
      type: object
      properties:
        captions:
          type: array
          items:
            $ref: "#/components/schemas/GeneratedCaption"
      required:
        - captions

    GeneratedCaption:
      type: object
      properties:
        platform:
          type: string
        text:
          type: string
      required:
        - platform
        - text

    SaveCaptionInput:
      type: object
      properties:
        save:
          type: boolean
      required:
        - save

    SavedCaption:
      type: object
      properties:
        id:
          type: integer
        captionId:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - captionId
        - createdAt

    BroadcastTemplate:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        message:
          type: string
        category:
          type: string
        niche:
          type: string
        usageCount:
          type: integer
        sentCount:
          type: integer
        openCount:
          type: integer
        clickCount:
          type: integer
        scheduledAt:
          type: ["string", "null"]
          format: date-time
        sentAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - message
        - category
        - niche
        - usageCount
        - sentCount
        - openCount
        - clickCount
        - createdAt

    BroadcastInput:
      type: object
      properties:
        title:
          type: string
        message:
          type: string
        category:
          type: string
        niche:
          type: string
        scheduledAt:
          type: string
          format: date-time
      required:
        - title
        - message
        - category
        - niche

    BroadcastStatsUpdate:
      type: object
      properties:
        sentCount:
          type: integer
        openCount:
          type: integer
        clickCount:
          type: integer
      required:
        - sentCount
        - openCount
        - clickCount

    BroadcastScheduleInput:
      type: object
      properties:
        scheduledAt:
          type: ["string", "null"]
          format: date-time
        sentAt:
          type: ["string", "null"]
          format: date-time

    BroadcastGenerateInput:
      type: object
      properties:
        niche:
          type: string
        promotionType:
          type: string
        audience:
          type: string
        discountPercentage:
          type: ["integer", "null"]
        productName:
          type: string
        businessName:
          type: string
      required:
        - niche
        - promotionType
        - audience
        - productName
        - businessName

    GeneratedBroadcast:
      type: object
      properties:
        message:
          type: string
        subject:
          type: string
      required:
        - message
        - subject

    Product:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        niche:
          type: string
        imageUrl:
          type: ["string", "null"]
        inStock:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - price
        - niche
        - inStock
        - createdAt

    ProductInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        niche:
          type: string
        imageUrl:
          type: string
        inStock:
          type: boolean
      required:
        - title
        - price
        - niche

    ProductUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        niche:
          type: string
        imageUrl:
          type: string
        inStock:
          type: boolean

    Order:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        customerName:
          type: string
        customerEmail:
          type: string
        status:
          type: string
          enum: [confirmed, payment_received, processing, shipped, out_for_delivery, delivered, cancelled]
        paymentStatus:
          type: string
          enum: [pending, paid, failed, refunded]
        total:
          type: number
        trackingNumber:
          type: ["string", "null"]
        courier:
          type: ["string", "null"]
        estimatedDelivery:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orderNumber
        - customerName
        - customerEmail
        - status
        - paymentStatus
        - total
        - createdAt

    OrderDetail:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        customerName:
          type: string
        customerEmail:
          type: string
        status:
          type: string
          enum: [confirmed, payment_received, processing, shipped, out_for_delivery, delivered, cancelled]
        paymentStatus:
          type: string
          enum: [pending, paid, failed, refunded]
        total:
          type: number
        trackingNumber:
          type: ["string", "null"]
        courier:
          type: ["string", "null"]
        estimatedDelivery:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orderNumber
        - customerName
        - customerEmail
        - status
        - paymentStatus
        - total
        - items
        - createdAt

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productTitle:
          type: string
        quantity:
          type: integer
        price:
          type: number
      required:
        - id
        - productId
        - productTitle
        - quantity
        - price

    OrderInput:
      type: object
      properties:
        customerName:
          type: string
        customerEmail:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"
      required:
        - customerName
        - customerEmail
        - items

    OrderItemInput:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
      required:
        - productId
        - quantity

    OrderStatusUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [confirmed, payment_received, processing, shipped, out_for_delivery, delivered, cancelled]
        trackingNumber:
          type: string
        courier:
          type: string
        estimatedDelivery:
          type: string
      required:
        - status

    OrderSummary:
      type: object
      properties:
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        activeOrders:
          type: integer
        deliveredOrders:
          type: integer
        cancelledOrders:
          type: integer
        pendingPayments:
          type: integer
        statusBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
      required:
        - totalOrders
        - totalRevenue
        - activeOrders
        - deliveredOrders
        - cancelledOrders
        - pendingPayments
        - statusBreakdown

    StatusCount:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
