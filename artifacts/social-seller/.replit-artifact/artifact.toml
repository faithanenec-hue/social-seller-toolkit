kind = "web"
previewPath = "/"
title = "Social Seller Toolkit"
version = "1.0.0"
id = "artifacts/social-seller"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24088

[services.development]
run = "pnpm --filter @workspace/social-seller run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/social-seller", "run", "build" ]
publicDir = "artifacts/social-seller/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24088"
BASE_PATH = "/"
